<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Speech Translation App</title>
    <style>
     body {
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #d62424, #40a5bc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Main container for both forms */
.main-container {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    padding: 30px;
    backdrop-filter: blur(10px);
}

/* Container for individual forms */
.container {
    background: rgba(0, 0, 0, 0.4);
    color: #fff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    transition: transform 0.5s ease-in-out, box-shadow 0.5s ease;
    width: 400px;
    height: auto;
}

.container:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 50px rgba(0, 0, 0, 0.7);
}

/* Header styles */
h2 {
    text-align: center;
    font-size: 24px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    color: #00e5ff;
}

/* Input Field Styles */
input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    font-size: 14px;
    border-radius: 8px;
    outline: none;
    transition: all 0.3s ease;
}

input::placeholder {
    color: #aaa;
    font-size: 12px;
}

input:focus {
    border: 1px solid #00e5ff;
    background: rgba(255, 255, 255, 0.3);
}

/* Button styles */
button {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    background: linear-gradient(45deg, #00e5ff, #00bcd4);
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.3s ease;
}

button:hover {
    background: linear-gradient(45deg, #00bcd4, #00e5ff);
    box-shadow: 0 4px 8px rgba(0, 255, 255, 0.3);
}

button:active {
    transform: translateY(2px);
}

/* Link styling */
a {
    color: #00e5ff;
    text-decoration: none;
    font-size: 14px;
}

a:hover {
    text-decoration: underline;
}

/* Paragraph styles */
p {
    text-align: center;
    margin-top: 20px;
    font-size: 16px;
    color: #ddd;
}

/* Responsive styling */
@media (max-width: 768px) {
    .main-container {
        flex-direction: column;
        padding: 20px;
    }

    .container {
        margin-bottom: 20px;
        width: 90%;
    }
}
    </style>
</head>
<body>

<div class="container">
    <div>
        <h2>IndiSpeech Application🤖</h2>
    </div>
    <h1>Login🛅</h1>
    <form action="{{ url_for('login') }}" method="POST">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
